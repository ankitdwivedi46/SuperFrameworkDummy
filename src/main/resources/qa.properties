##################################################
# UI CONFIGS
##################################################

ui.qa.baseUrl=https://qa-ui.example.com

ui.browser=chrome
ui.headless=true
ui.implicitWaitSec=10
ui.pageLoadTimeoutSec=60

##################################################
# API CONFIGS
##################################################

api.qa.baseUrl=https://qa-api.example.com

api.timeoutMs=60000
api.relaxedHttps=false

##################################################
# PRODUCT API
##################################################

api.qa.product.baseUrl=https://qa-product.example.com
api.qa.product.basePath=/v1/products

##################################################
# PAYMENT API
##################################################

api.qa.payment.baseUrl=https://qa-payment.example.com
api.qa.payment.basePath=/v1/payments

##################################################
# DATABASE
##################################################

db.qa.url=jdbc:mysql://qa-host:3306/app

db.username=root
db.password=secret

##################################################
# FALLBACK DEFAULTS
##################################################

ui.baseUrl=https://default-ui.example.com

api.baseUrl=https://default-api.example.com

db.url=jdbc:mysql://default-host:3306/app

api.product.baseUrl=https://default-product.example.com
api.product.basePath=/products