##################################################
# UI CONFIGS
##################################################

ui.dev.baseUrl=https://dev-ui.example.com

ui.browser=chrome
ui.headless=true
ui.implicitWaitSec=10
ui.pageLoadTimeoutSec=60

##################################################
# API CONFIGS
##################################################

api.dev.baseUrl=https://dev-api.example.com

api.timeoutMs=60000
api.relaxedHttps=false

##################################################
# PRODUCT API
##################################################

api.dev.product.baseUrl=https://dev-product.example.com
api.dev.product.basePath=/v1/products

##################################################
# PAYMENT API
##################################################

api.dev.payment.baseUrl=https://dev-payment.example.com
api.dev.payment.basePath=/v1/payments

##################################################
# DATABASE
##################################################

db.dev.url=jdbc:mysql://dev-host:3306/app

db.username=root
db.password=secret

##################################################
# FALLBACK DEFAULTS
##################################################

ui.baseUrl=https://dev-ui.example.com

api.baseUrl=https://dev-api.example.com

db.url=jdbc:mysql://dev-host:3306/app

