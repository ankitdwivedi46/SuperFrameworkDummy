##################################################
# UI CONFIGS
##################################################

ui.prod.baseUrl=https://prod-ui.example.com

ui.browser=chrome
ui.headless=true
ui.implicitWaitSec=10
ui.pageLoadTimeoutSec=60

##################################################
# API CONFIGS
##################################################

api.prod.baseUrl=https://prod-api.example.com

api.timeoutMs=60000
api.relaxedHttps=false

##################################################
# PRODUCT API
##################################################

api.prod.product.baseUrl=https://prod-product.example.com
api.prod.product.basePath=/v1/products

##################################################
# PAYMENT API
##################################################

api.prod.payment.baseUrl=https://prod-payment.example.com
api.prod.payment.basePath=/v1/payments

##################################################
# DATABASE
##################################################

db.prod.url=jdbc:mysql://prod-host:3306/app

db.username=root
db.password=secret

##################################################
# FALLBACK DEFAULTS
##################################################

ui.baseUrl=https://prod-ui.example.com

api.baseUrl=https://prod-api.example.com

db.url=jdbc:mysql://prod-host:3306/app

api.product.baseUrl=https://prod-product.example.com
api.product.basePath=/products